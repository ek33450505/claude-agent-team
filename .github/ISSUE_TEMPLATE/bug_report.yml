name: Bug Report
description: Report a bug or unexpected behavior in CAST
labels: [bug]
title: "[Bug] "
body:
  - type: input
    id: cast-version
    attributes:
      label: CAST Version
      placeholder: "e.g. 3.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: [macOS, Linux]
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code Version
      placeholder: "e.g. 1.2.3"
  - type: dropdown
    id: hook
    attributes:
      label: Hook That Fired
      options: [pre-tool-guard.sh, post-tool-hook.sh, cast-cost-tracker.sh, cast-session-end.sh, cast-post-compact-hook.sh, other]
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: hook-output
    attributes:
      label: Hook Output
      description: Paste the raw hook output or cast.db / cast-events entries
  - type: textarea
    id: context
    attributes:
      label: Additional Context
